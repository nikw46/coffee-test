<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>測驗入口</title>
<style>
  body {
    font-family: sans-serif;
    padding: 20px;
    max-width: 760px;
    margin: auto;
    line-height: 1.5;
  }

  h1, h2, h3 {
    margin-top: 0;
  }

  .hidden {
    display: none;
  }

  .menu {
    margin-bottom: 20px;
  }

  button {
    padding: 10px 14px;
    margin: 5px;
    cursor: pointer;
  }

  input {
    width: 100%;
    padding: 8px;
    margin: 5px 0;
    box-sizing: border-box;
  }

  .row {
    margin-bottom: 10px;
  }

  .correct {
    background: #d4edda;
    padding: 6px;
  }

  .wrong {
    background: #f8d7da;
    padding: 6px;
  }

  .answerBox {
    margin-top: 10px;
    padding: 10px;
    border: 1px solid #ccc;
  }

  hr {
    margin: 16px 0;
  }
</style>
</head>
<body>

<h1>測驗入口</h1>

<div id="homePage" class="menu">
  <button onclick="openBeanMenu()">豆單測驗</button>
  <button onclick="startRecipeQuiz()">配方測驗</button>
</div>

<div id="beanMenu" class="menu hidden">
  <h3>選擇豆單題庫</h3>
  <button onclick="startBeanQuiz('single')">單品豆單測驗</button>
  <button onclick="startBeanQuiz('blend')">配方豆單測驗</button>
  <button onclick="goHome()">回入口</button>
</div>

<div id="quizPage" class="hidden">
  <h3 id="setText"></h3>
  <h3 id="modeText"></h3>
  <h2 id="questionNum"></h2>

  <div id="table"></div>
  <div id="feedback" class="answerBox"></div>
  <div id="resultPage" class="hidden"></div>

  <div id="controlArea">
    <button id="prevBtn" onclick="prev()">上一題</button>
    <button id="checkBtn" onclick="checkAnswer()">確認答案</button>
    <button id="nextBtn" onclick="next()">下一題</button>
    <button id="modeBtn" onclick="toggleMode()">切換模式</button>
    <button onclick="goHome()">回入口</button>
  </div>
</div>

<script src="singleData.js"></script>
<script src="blendData.js"></script>
<script src="recipeData.js"></script>

<script>
const label = {
  country: "國家",
  process: "處理方式",
  roast: "焙度",
  taste: "口味",
  flavor: "入口風味",
  priceQuarter: "1/4磅價錢",
  priceHalf: "1/2磅價錢",
  drip: "掛耳單包"
};

let quizType = ""; // bean / recipe
let beanSet = "";  // single / blend
let mode = "practice"; // practice / exam

let index = 0;
let answers = {};
let blanksRecord = {};
let shuffledData = [];
let currentNormalFields = [];
let currentPriceFields = [];

// ---------- 共用工具 ----------
function shuffle(arr) {
  return [...arr].sort(() => Math.random() - 0.5);
}

function split(v) {
  return (v || "")
    .replace(/，/g, "、")
    .split("、")
    .map(s => s.trim())
    .filter(Boolean);
}

function resetState() {
  index = 0;
  answers = {};
  blanksRecord = {};
}

function showOnly(pageId) {
  document.getElementById("homePage").classList.add("hidden");
  document.getElementById("beanMenu").classList.add("hidden");
  document.getElementById("quizPage").classList.add("hidden");

  document.getElementById(pageId).classList.remove("hidden");
}

function goHome() {
  quizType = "";
  beanSet = "";
  shuffledData = [];
  resetState();
  showOnly("homePage");
}

function updateModeButtonText() {
  const btn = document.getElementById("modeBtn");
  if (mode === "practice") {
    btn.textContent = "切換到測驗模式";
  } else {
    btn.textContent = "切換到練習模式";
  }
}

// ---------- 入口 ----------
function openBeanMenu() {
  showOnly("beanMenu");
}

// ---------- 豆單 ----------
function getBeanFieldConfig(setName) {
  if (setName === "single") {
    return {
      normal: ["country", "process", "roast", "taste", "flavor"],
      price: ["priceQuarter", "priceHalf", "drip"]
    };
  }

  return {
    normal: ["country", "roast", "taste", "flavor"],
    price: ["priceHalf", "drip"]
  };
}

function getBeanSourceData(setName) {
  return setName === "single" ? singleData : blendData;
}

function startBeanQuiz(setName, keepMode = false) {
  quizType = "bean";
  beanSet = setName;

  if (!keepMode) {
    mode = "practice";
  }

  const config = getBeanFieldConfig(setName);
  currentNormalFields = config.normal;
  currentPriceFields = config.price;

  shuffledData = shuffle(getBeanSourceData(setName));
  resetState();

  document.getElementById("setText").innerText =
    setName === "single" ? "單品豆單測驗" : "配方豆單測驗";

  document.getElementById("modeBtn").style.display = "inline-block";
  document.getElementById("prevBtn").style.display = "inline-block";
  document.getElementById("nextBtn").style.display = "inline-block";

  updateModeButtonText();

  showOnly("quizPage");
  renderBeanQuiz();
}

function getBeanBlanks(i) {
  if (blanksRecord[i]) return blanksRecord[i];

  const bean = shuffledData[i];

  const availableNormal = currentNormalFields.filter(key => {
    const value = bean[key];
    return value !== undefined && value !== "";
  });

  const normalCount = Math.min(
    availableNormal.length,
    Math.floor(Math.random() * 2) + 2
  );

  const pickedNormal = shuffle(availableNormal).slice(0, normalCount);

  const availablePrice = currentPriceFields.filter(key => {
    const value = bean[key];
    return value !== undefined && value !== "";
  });

  let pickedPrice = [];
  if (availablePrice.length > 0) {
    pickedPrice = shuffle(availablePrice).slice(0, 1);
  }

  const result = [...pickedNormal, ...pickedPrice];
  blanksRecord[i] = result;
  return result;
}

function renderBeanQuiz() {
  const bean = shuffledData[index];
  const blanks = getBeanBlanks(index);
  const allFields = [...currentNormalFields, ...currentPriceFields];

  document.getElementById("modeText").innerText =
    mode === "practice" ? "練習模式" : "測驗模式";

  document.getElementById("questionNum").innerText =
    `第 ${index + 1} 題 / ${shuffledData.length}`;

  document.getElementById("checkBtn").style.display =
    mode === "practice" ? "inline-block" : "none";

  let html = `<div class="row"><b>品項：</b>${bean.item}</div>`;

  for (const key of allFields) {
    if (!(key in bean)) continue;
    const value = bean[key];
    if (value === undefined || value === "") continue;

    if (blanks.includes(key)) {
      html += `
        <div class="row">
          <b>${label[key]}：</b>
          <input id="${key}" value="${answers[index]?.[key] || ""}">
        </div>
      `;
    } else {
      html += `<div class="row"><b>${label[key]}：</b>${value}</div>`;
    }
  }

  document.getElementById("table").innerHTML = html;
  document.getElementById("feedback").innerHTML = "";
  document.getElementById("resultPage").classList.add("hidden");
  document.getElementById("table").style.display = "block";
  document.getElementById("feedback").style.display = "block";
}

function saveBeanAnswers(bean) {
  const allFields = [...currentNormalFields, ...currentPriceFields];
  answers[index] = answers[index] || {};

  for (const key of allFields) {
    const input = document.getElementById(key);
    if (input) {
      answers[index][key] = input.value;
    }
  }
}

function checkBeanCore(bean, userAnswers) {
  let html = "";
  let score = 0;
  let total = 0;

  const allFields = [...currentNormalFields, ...currentPriceFields];

  for (const key of allFields) {
    if (!(key in bean)) continue;
    const correctValue = bean[key];
    if (correctValue === undefined || correctValue === "") continue;

    const userValue = userAnswers[key];
    if (userValue === undefined) continue;

    total++;

    if (key === "flavor" || key === "country") {
      const correctArr = split(correctValue);
      const userArr = split(userValue);

      const hit = userArr.filter(v => correctArr.includes(v)).length;
      const extra = userArr.filter(v => !correctArr.includes(v)).length;

      let s = (hit / correctArr.length) - (extra * 0.2);
      s = Math.max(0, s);

      score += s;

      html += `
        <div class="${s === 1 ? "correct" : "wrong"}">
          ${label[key]}：${userValue || "未填"}｜正確：${correctValue}
        </div>
      `;
    } else {
      if (userValue === correctValue) {
        score++;
        html += `<div class="correct">${label[key]} 正確</div>`;
      } else {
        html += `
          <div class="wrong">
            ${label[key]}：${userValue || "未填"}｜正確：${correctValue}
          </div>
        `;
      }
    }
  }

  return { score: total ? score / total : 0, html };
}

function showBeanResult() {
  let totalScore = 0;
  const totalQuestions = shuffledData.length;
  let html = `<h3>${beanSet === "single" ? "單品豆單" : "配方豆單"}結果</h3>`;

  shuffledData.forEach((bean, i) => {
    const result = checkBeanCore(bean, answers[i] || {});
    totalScore += result.score;

    html += `<hr><b>第 ${i + 1} 題：${bean.item}</b>`;
    html += result.html;
  });

  const final = totalQuestions
    ? (totalScore / totalQuestions * 100).toFixed(0)
    : 0;

  html += `<h2>總分：${final}</h2>`;
  html += `<button id="restartBtn">重新測驗</button>`;

  document.getElementById("table").style.display = "none";
  document.getElementById("feedback").style.display = "none";
  document.getElementById("resultPage").classList.remove("hidden");
  document.getElementById("resultPage").innerHTML = html;

  document.getElementById("restartBtn").onclick = function () {
    startBeanQuiz(beanSet, true);
  };
}

// ---------- 配方 ----------
function getRecipeFields(recipe) {
  return Object.keys(recipe).filter(key => key !== "item" && recipe[key] !== "");
}

function startRecipeQuiz(keepMode = false) {
  quizType = "recipe";

  if (!keepMode) {
    mode = "practice";
  }

  // 每次隨機抽 20 個完整品項
  shuffledData = shuffle(recipeData).slice(0, 20);
  resetState();

  document.getElementById("setText").innerText = "配方測驗";
  document.getElementById("modeBtn").style.display = "inline-block";
  document.getElementById("prevBtn").style.display = "inline-block";
  document.getElementById("nextBtn").style.display = "inline-block";

  updateModeButtonText();

  showOnly("quizPage");
  renderRecipeQuiz();
}

function renderRecipeQuiz() {
  const recipe = shuffledData[index];
  const fields = getRecipeFields(recipe);

  document.getElementById("modeText").innerText =
    mode === "practice" ? "練習模式" : "測驗模式";

  document.getElementById("questionNum").innerText =
    `第 ${index + 1} 題 / ${shuffledData.length}`;

  document.getElementById("checkBtn").style.display =
    mode === "practice" ? "inline-block" : "none";

  let html = `<div class="row"><b>品項：</b>${recipe.item}</div>`;

  for (const key of fields) {
    html += `
      <div class="row">
        <b>${key}：</b>
        <input id="recipe_${key}" value="${answers[index]?.[key] || ""}">
      </div>
    `;
  }

  document.getElementById("table").innerHTML = html;
  document.getElementById("feedback").innerHTML = "";
  document.getElementById("resultPage").classList.add("hidden");
  document.getElementById("table").style.display = "block";
  document.getElementById("feedback").style.display = "block";
}

function saveRecipeAnswer() {
  const recipe = shuffledData[index];
  const fields = getRecipeFields(recipe);

  answers[index] = answers[index] || {};

  for (const key of fields) {
    const input = document.getElementById(`recipe_${key}`);
    answers[index][key] = input ? input.value : "";
  }
}

function checkRecipeCore(recipe, userAnswer) {
  const fields = getRecipeFields(recipe);
  let html = "";
  let score = 0;
  let total = 0;

  for (const key of fields) {
    total++;
    const correct = recipe[key];
    const user = userAnswer?.[key] || "";

    if (user === correct) {
      score++;
      html += `<div class="correct">${key} 正確</div>`;
    } else {
      html += `<div class="wrong">${key}：${user || "未填"}｜正確：${correct}</div>`;
    }
  }

  return {
    score: total ? score / total : 0,
    html
  };
}

function showRecipeResult() {
  let totalScore = 0;
  const totalQuestions = shuffledData.length;
  let html = `<h3>配方測驗結果</h3>`;

  shuffledData.forEach((recipe, i) => {
    const result = checkRecipeCore(recipe, answers[i] || {});
    totalScore += result.score;

    html += `<hr><b>第 ${i + 1} 題：${recipe.item}</b>`;
    html += result.html;
  });

  const final = totalQuestions
    ? (totalScore / totalQuestions * 100).toFixed(0)
    : 0;

  html += `<h2>總分：${final}</h2>`;
  html += `<button id="restartBtn">重新測驗</button>`;

  document.getElementById("table").style.display = "none";
  document.getElementById("feedback").style.display = "none";
  document.getElementById("resultPage").classList.remove("hidden");
  document.getElementById("resultPage").innerHTML = html;

  document.getElementById("restartBtn").onclick = function () {
    startRecipeQuiz(true);
  };
}

// ---------- 共用操作 ----------
function checkAnswer() {
  if (!shuffledData.length) return;

  if (quizType === "bean") {
    const bean = shuffledData[index];
    saveBeanAnswers(bean);
    const result = checkBeanCore(bean, answers[index]);
    document.getElementById("feedback").innerHTML =
      result.html + `<br><b>得分：${result.score.toFixed(2)}</b>`;
    return;
  }

  if (quizType === "recipe") {
    saveRecipeAnswer();
    const result = checkRecipeCore(shuffledData[index], answers[index]);
    document.getElementById("feedback").innerHTML =
      result.html + `<br><b>得分：${result.score.toFixed(2)}</b>`;
  }
}

function next() {
  if (!shuffledData.length) return;

  if (quizType === "bean") {
    saveBeanAnswers(shuffledData[index]);
  } else if (quizType === "recipe") {
    saveRecipeAnswer();
  }

  if (index < shuffledData.length - 1) {
    index++;
    if (quizType === "bean") {
      renderBeanQuiz();
    } else {
      renderRecipeQuiz();
    }
  } else {
    if (quizType === "bean") {
      showBeanResult();
    } else {
      showRecipeResult();
    }
  }
}

function prev() {
  if (!shuffledData.length || index === 0) return;

  index--;
  if (quizType === "bean") {
    renderBeanQuiz();
  } else {
    renderRecipeQuiz();
  }
}

function toggleMode() {
  if (quizType === "bean" && beanSet) {
    mode = mode === "practice" ? "exam" : "practice";
    startBeanQuiz(beanSet, true);
    return;
  }

  if (quizType === "recipe") {
    mode = mode === "practice" ? "exam" : "practice";
    startRecipeQuiz(true);
  }
}
</script>

</body>
</html>
